# LLM settings
llm_provider: groq
groq_model_id: llama-3.3-70b-versatile
llm_temperature: 0.0
llm_max_tokens: 1024

# Embedding settings
embedding_provider: sentence_transformers
sentence_transformer_model: all-MiniLM-L6-v2

# Chunking
chunk_size: 800
chunk_overlap: 150

# Retrieval
top_k: 5
similarity_threshold: 0.25

# Vector store
vector_store_backend: chroma
chroma_collection_prefix: "contract_"
chat_history_collection: chat_history

# Multi-document
max_documents: 20
default_query_mode: all

# Session memory
session_history_top_k: 3
max_session_turns: 50

# Server
api_host: "0.0.0.0"
api_port: 8000
gradio_host: "0.0.0.0"
gradio_port: 7860
gradio_share: false

# Logging
log_level: INFO

# Evaluation
eval_num_questions: 10
eval_baseline_doc_fraction: 0.1
